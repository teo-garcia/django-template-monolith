repos:
  - repo: local
    hooks:
      - id: ruff-config
        name: Generate Ruff shared config
        entry: sh -c 'printf "extend = \"%s\"\n" "$(uv run teo-ruff-config-path)" > ruff.extend.toml'
        language: system
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: Type check
        entry: uv run mypy .
        language: system
        pass_filenames: false

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
